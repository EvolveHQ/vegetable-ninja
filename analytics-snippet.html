<!-- Google Analytics (consent-gated) + cookie banner.
     Injected into dist/index.html by `just dist` - NOT part of the dev build.
     gtag.js is loaded only after the visitor accepts. -->
<style>
  #cookiebar {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
    z-index: 20; max-width: 560px; width: calc(100vw - 32px);
    background: rgba(8, 30, 22, .96); border: 1px solid #3d6b52;
    border-radius: 12px; color: #cfe3d6; padding: 14px 16px;
    font: 14px/1.45 system-ui, sans-serif;
  }
  #cookiebar .btns { margin-top: 10px; display: flex; gap: 10px; justify-content: flex-end; }
  #cookiebar button { border: 0; border-radius: 8px; padding: 8px 18px; cursor: pointer; font: inherit; }
  #cookiebar .ok { background: #56a04c; color: #fff; }
  #cookiebar .no { background: #2c3c34; color: #cfe3d6; }
</style>
<div id="cookiebar" hidden>
  <div>We use Google Analytics to understand how many people play.
  Analytics cookies are set only if you accept.</div>
  <div class="btns">
    <button class="no" id="ck-no">Decline</button>
    <button class="ok" id="ck-ok">Accept</button>
  </div>
</div>
<script>
(function () {
  var KEY = 'ga-consent';
  function loadGA() {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=G-DF3L87KBNV';
    document.head.appendChild(s);
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    window.gtag = gtag;
    gtag('js', new Date());
    gtag('config', 'G-DF3L87KBNV');
  }
  var bar = document.getElementById('cookiebar');
  var choice = null;
  try { choice = localStorage.getItem(KEY); } catch (e) {}
  if (choice === 'granted') { loadGA(); return; }
  if (choice === 'denied') return;
  bar.hidden = false;
  document.getElementById('ck-ok').onclick = function () {
    try { localStorage.setItem(KEY, 'granted'); } catch (e) {}
    bar.hidden = true;
    loadGA();
  };
  document.getElementById('ck-no').onclick = function () {
    try { localStorage.setItem(KEY, 'denied'); } catch (e) {}
    bar.hidden = true;
  };
})();
</script>
