<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="description" content="Vegetable Ninja - a saga-style arcade slicing game. Swipe to slice vegetables, dodge bombs, earn stars across 2 worlds of 10 stages.">
<title>Vegetable Ninja</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #04110d; overflow: hidden; }
  /* The canvas display size must ALWAYS equal the viewport: raylib keeps the
     backbuffer at window.innerWidth/Height (FLAG_WINDOW_RESIZABLE), and any
     mismatch between backbuffer and displayed size skews mouse coordinates.
     !important beats the inline style GLFW sets at startup. */
  canvas {
    display: block;
    width: 100vw !important;
    height: 100vh !important;
    height: 100dvh !important;
    outline: none;
    cursor: crosshair;
    touch-action: none;
  }
  #status {
    position: absolute; color: #9fc9ae; font: 18px monospace;
    left: 50%; top: 50%; transform: translate(-50%, -50%);
  }
  #fsbtn {
    position: fixed; right: 14px; bottom: 14px; z-index: 10;
    width: 46px; height: 46px; border-radius: 10px;
    border: 1px solid #3d6b52; background: rgba(8, 30, 22, 0.75);
    color: #9fc9ae; font-size: 22px; line-height: 1; cursor: pointer;
  }
  #fsbtn:hover { background: rgba(20, 60, 44, 0.9); }
  #credit {
    position: fixed; left: 14px; bottom: 14px; z-index: 10;
    color: #6f8f7c; font: 13px system-ui, sans-serif;
  }
  #credit a { color: #9fc9ae; text-decoration: none; }
  #credit a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="status">loading vegetables...</div>
<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
<button id="fsbtn" title="Fullscreen" aria-label="Fullscreen">&#x26F6;</button>
<div id="credit">created with &#x2665; using
  <a href="https://evolvehq.github.io/docflow/" target="_blank" rel="noopener">docflow</a></div>
<script>
  var Module = {
    canvas: document.getElementById('canvas'),
    onRuntimeInitialized: function () {
      var s = document.getElementById('status');
      if (s) s.remove();
    },
    // Pointer state read by the game each frame (see main.c PLATFORM_WEB).
    // clientX/Y are CSS px; the canvas backbuffer is kept at
    // innerWidth/innerHeight, so CSS px == backbuffer px, no scaling needed.
    pointer: { x: 0, y: 0, down: 0 }
  };

  (function () {
    // Pointer Events with capture: exactly one pointerId drives the blade.
    // Other concurrent pointers (extra fingers, other buttons) are ignored,
    // and capture delivers the release even outside the window — a second
    // touch can never teleport the blade, and it can never get stuck held.
    var P = Module.pointer;
    var canvas = document.getElementById('canvas');
    var bladeId = null;
    canvas.addEventListener('pointerdown', function (e) {
      if (bladeId !== null) return;                    // one blade at a time
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      bladeId = e.pointerId;
      try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
      P.x = e.clientX; P.y = e.clientY; P.down = 1;
    });
    canvas.addEventListener('pointermove', function (e) {
      if (bladeId !== null && e.pointerId !== bladeId) return;
      P.x = e.clientX; P.y = e.clientY;                // blade drag, or hover
    });
    function release(e) {
      if (e.pointerId !== bladeId) return;
      bladeId = null; P.down = 0;
    }
    canvas.addEventListener('pointerup', release);
    canvas.addEventListener('pointercancel', release);
    window.addEventListener('blur', function () { bladeId = null; P.down = 0; });
  })();

  (function () {
    var canvas = document.getElementById('canvas');
    var fsbtn = document.getElementById('fsbtn');

    function goFullscreen() {
      var el = document.documentElement;
      var req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (!req) return;
      var p = req.call(el);
      if (p && p.then) {
        p.then(function () {
          if (screen.orientation && screen.orientation.lock)
            screen.orientation.lock('landscape').catch(function () {});
        }).catch(function () {});
      }
      fsbtn.blur();   // don't let SPACE re-trigger the button
    }

    fsbtn.addEventListener('click', goFullscreen);
    document.addEventListener('fullscreenchange', function () {
      fsbtn.style.display = document.fullscreenElement ? 'none' : 'block';
    });

    // On touch devices, rotating to landscape arms the next tap to enter
    // fullscreen (browsers only allow fullscreen from a user gesture).
    if (window.matchMedia && 'ontouchstart' in window) {
      var mq = window.matchMedia('(orientation: landscape)');
      var onRotate = function (e) {
        if (e.matches && !document.fullscreenElement) {
          var once = function () {
            canvas.removeEventListener('touchend', once);
            goFullscreen();
          };
          canvas.addEventListener('touchend', once, { passive: true });
        }
      };
      if (mq.addEventListener) mq.addEventListener('change', onRotate);
      else if (mq.addListener) mq.addListener(onRotate);
    }
  })();
</script>
{{{ SCRIPT }}}
</body>
</html>
